<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動照片導覽系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .img-container { position: relative; width: 100%; padding-top: 65%; overflow: hidden; background: #e2e8f0; }
        .img-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
        .glass-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- 標題部分 -->
        <header class="mb-8 flex items-center justify-center gap-6">
            <img src="https://lh3.googleusercontent.com/d/1IUW5Uq5M8pgTfMX6zE58J7gUcs1Wo6fo" alt="Left Icon" class="w-12 h-12 rounded-full shadow-sm">
            <div class="text-center">
                <h1 class="text-3xl font-bold text-slate-800 mb-2">JDJ 的相片館</h1>
            </div>
            <img src="https://lh3.googleusercontent.com/d/1ljk-8EQ-BiXlaDE-EzEG2TvCs6GhWKsO" alt="Right Icon" class="w-6 h-6 rounded-full shadow-sm">
            <!--img src="https://lh3.googleusercontent.com/d/1Cjh7TqL1QPqufsldJgmA_w8J00eks2kP" alt="Right Icon" class="w-12 h-12 rounded-full shadow-sm"-->
        </header>

        <!-- 篩選器 -->
        <div class="glass-card rounded-2xl p-6 mb-8 shadow-sm flex flex-wrap gap-4 items-end">
            <div class="flex-1 min-w-[150px]">
                <label class="block text-sm font-medium text-slate-600 mb-2">地區</label>
                <select id="regionFilter" class="w-full bg-white border border-slate-200 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                    <option value="all">所有地區</option>
                </select>
            </div>
            <div class="flex-1 min-w-[150px]">
                <label class="block text-sm font-medium text-slate-600 mb-2">國家/城市</label>
                <select id="countryFilter" class="w-full bg-white border border-slate-200 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                    <option value="all">所有地點</option>
                </select>
            </div>
            <button id="resetBtn" class="px-6 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg font-medium transition-colors">重設</button>
        </div>

        <div id="stats" class="mb-4 text-sm text-slate-500 font-medium"></div>
        <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        <div id="pagination" class="mt-12 flex justify-center items-center gap-2"></div>
        <div id="emptyState" class="hidden py-20 text-center"><p class="text-slate-400 text-lg">找不到符合條件的照片</p></div>
    </div>

    <!-- 引用資料與邏輯 -->
    <script src="data.js"></script>
    <script src="main.js"></script>
</body>
</html>
